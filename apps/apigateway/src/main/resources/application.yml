  # ============================================
  #============================================
  #TABLE: rate-limit-rules
  #============================================
  ratelimit:
    rules:
        # IP-based: chống DDoS/bot flood, áp dụng cho tất cả endpoints
        - id: faf2473a-7310-4b59-88a6-580d45bc2ca3
          type: TOKEN_BUCKET
          key_type: IP
          rule: '{
            "replenish_rate": "20",
            "burst_capacity": "200",
            "ttl": "120"
          }'
          enabled: true

        # IP-based: giới hạn chặt cho các endpoint đăng nhập/đăng kí/quên mật khẩu/reset mật khẩu
        - id: 28b73ad0-9f59-41a4-b7cb-65b1156d232f
          type: SLIDING_WINDOW
          key_type: EMAIL
          rule: '{
            "methods": ["POST", "PUT", "PATCH"],
            "path_regex": "^/api(?:/[^/]+)*/auth/(login|register|reset-password|forgot-password|test)(?:/.*)?$",
            "window": "60",
            "limit": "30",
            "priority": "1"
          }'
          enabled: true

        # Account-based: quota per user, áp dụng cho protected endpoints
        - id: 917c6f5d-c52b-47b5-890d-7a823ae6cd60
          type: SLIDING_WINDOW
          key_type: ACCOUNT_ID
          rule: '{
            "methods": ["GET", "POST"],
            "path_regex": "^/api/.*/(export|download|generate).*$",
            "window": "120",
            "limit": "2",
            "priority": "1"
          }'
          enabled: true

        - id: 8967e87e-ade9-413c-b0ec-d336c44a9eff
          type: SLIDING_WINDOW
          key_type: ACCOUNT_ID
          rule: '{
            "methods": ["POST", "PUT", "PATCH", "DELETE"],
            "path_regex": ".*",
            "window": "60",
            "limit": "20",
            "priority": "2"
          }'
          enabled: true

        - id: a0ffb6f4-bd1b-41ef-b1d4-159542194ba0
          type: SLIDING_WINDOW
          key_type: ACCOUNT_ID
          rule: '{
            "methods": ["GET", "HEAD"],
            "path_regex": ".*",
            "window": "60",
            "limit": "100",
            "priority": "3"
          }'
          enabled: true

  #============================================
  #TABLE: circuit-breaker-rules
  #============================================
  circuitbreaker:
    rules:
      - id: 1c9e4d2b-1b2e-4eac-9a62-0b6e8a8ea010
        service_id:
        enabled: true
        failure_rate_threshold: 35
        slow_call_rate_threshold: 50
        slow_call_duration_threshold: 10s
        permitted_number_of_calls_in_half_open_state: 2
        sliding_window_type: COUNT_BASED
        sliding_window_size:  50
        minimum_number_of_calls: 25
        wait_duration_in_open_state: 20s
        name: defaultCircuitBreaker

      - id: 2f5a6c7d-3e8a-4d21-9b10-7a1c2d3e4f50
        service_id: 1d07a7fe-0fbd-4e62-8f52-f6f3452e01dd
        enabled: true
        failure_rate_threshold: 50
        slow_call_rate_threshold: 50
        slow_call_duration_threshold: 8s
        permitted_number_of_calls_in_half_open_state: 5
        sliding_window_type: COUNT_BASED
        sliding_window_size: 50
        minimum_number_of_calls: 20
        wait_duration_in_open_state: 30s
        name: orderServiceCircuitBreaker

