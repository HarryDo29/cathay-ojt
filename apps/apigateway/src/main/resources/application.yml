spring:
  application:
    name: ApiGateway project for Cathay Life Vietnam
#  data:
#    redis:
#      host: apigateway-redis
#      port: 6379
#      timeout: 2000ms
#      repositories:
#        enabled: false
  config:
    import: optional:file:./secret.properties

server:
  port: 8080

app:
  limits:
    max_body_size: 10MB      # Spring tự hiểu MB, KB
    max_header_size: 8KB
    max_query_params: 50

  cors:
    allowed_origins:
      - id: dc2e8355-eaf4-45ed-a0e6-d042f26fc15e
        origin: http://localhost:5173
        enabled: true

      - id: 43b6af5e-7476-4232-a1f6-df9825495caf
        origin: http://localhost:3000
        enabled: true

    allowed_headers:
      - id: 1b3e0079-6d3f-472a-aca1-587f93a5c819
        header: Content-Type
        enabled: true

      - id: 95b6c166-c87a-4484-8640-6372e0388449
        header: Authorization
        enabled: true

      - id: 2818d6cb-392e-49b0-be74-108c35b14834
        header: Accept
        enabled: true

      - id: acd5b0fb-e0e2-416b-8388-e941b6067056
        header: Origin
        enabled: true

      - id: 6a8c684e-75f8-431d-be2e-8be6e53f8f33
        header: Access-Control-Request-Method
        enabled: true

      - id: fe4c7ac2-bee7-4ee1-8b04-edd57bb6fb1a
        header: Access-Control-Request-Headers
        enabled: true

      - id: fe6b3233-bb56-4ba7-be11-ec93677aee8d
        header: X-XSRF-Token
        enabled: true

      - id: 892d5b15-7704-4f5f-bcc2-a0ff9a6a9b37
        header: X-Request-Id
        enabled: true

      - id: 885c49ad-1656-477a-a8c4-0efd60e7004c
        header: X-Api-Key
        enabled: true

  routes:
    # ============================================
    # TABLE: services
    # ============================================
    services:
        - id: fc222ee8-06b5-4c35-ad6a-46c079a8cf8e
          name: identity-service
          url: http://identify-service:8081
          path: /api/v1/identify-service/**
          strip_prefix: 3
          enabled: true

        - id: 1d07a7fe-0fbd-4e62-8f52-f6f3452e01dd
          name: order-service
          url: http://order-service:8082
          path: /api/v1/order-service/**
          strip_prefix: 3
          enabled: true
    # ============================================
    # TABLE: filters
    # ============================================
    filters:
        - id: 5ed4e50d-6b1e-492a-967a-25efd9361232
          name: Authentication
          description: Verify JWT token and set user context
          status: ACTIVE

        - id: 517067c0-f87d-4cc6-8bc4-6ddae1e4cea2
          name: Authorization
          description: Check user permissions based on roles and endpoint access rules
          status: ACTIVE

        - id: 074e0fd8-2f25-488f-b4b6-575b3d29ddce
          name: AccountBasedRateLimit
          description: Apply rate limits based on user account
          status: ACTIVE

        - id: e4436c68-1b15-443c-999b-b08687766376
          name: EmailBasedRateLimit
          description: Apply rate limits based on email domain for public endpoints needing extra protection
          status: ACTIVE
    # ============================================
